name: Flight Alert Scraper

on:
  schedule:
    # 5:00 UTC → 7:00 CEST / 6:00 CET
    - cron: '0 5 * * *'
    # 14:00 UTC → 16:00 CEST / 15:00 CET
    - cron: '0 14 * * *'
    # 20:00 UTC → 22:00 CEST (estate) — notifica serale
    - cron: '0 20 * * *'
    # 21:00 UTC → 22:00 CET (inverno) — notifica serale
    - cron: '0 21 * * *'
  workflow_dispatch:
    inputs:
      departure_date:
        description: 'Data andata (YYYY-MM-DD) — lascia vuoto per ricerca generica'
        required: false
        type: string
      return_date:
        description: 'Data ritorno (YYYY-MM-DD) — lascia vuoto per solo andata'
        required: false
        type: string
      send_telegram:
        description: 'Invia notifica Telegram con i risultati'
        required: false
        default: true
        type: boolean

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: scraper/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: scraper

      - name: Run scraper
        run: npm start
        working-directory: scraper
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DEPARTURE_DATE: ${{ inputs.departure_date || '' }}
          RETURN_DATE: ${{ inputs.return_date || '' }}
          SEND_TELEGRAM: ${{ inputs.send_telegram || 'false' }}

      - name: Commit updated prices
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "flight-alert-bot"
          git config user.email "bot@flight-alert.dev"
          git add data/prices.json data/prices.csv
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "snapshot $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git push "https://x-access-token:$(gh auth token)@github.com/${GITHUB_REPOSITORY}.git" HEAD:${GITHUB_REF_NAME}
          fi
