name: Flight Alert Scraper

on:
  schedule:
    - cron: '0 5 * * *'
    - cron: '0 14 * * *'
    - cron: '0 20 * * *'
    - cron: '0 4 * * *'
    - cron: '0 13 * * *'
    - cron: '0 19 * * *'
  workflow_dispatch:
    inputs:
      departure_date:
        description: 'Data andata (YYYY-MM-DD) — lascia vuoto per ricerca generica'
        required: false
        type: string
      return_date:
        description: 'Data ritorno (YYYY-MM-DD) — lascia vuoto per solo andata'
        required: false
        type: string

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: scraper/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: scraper

      - name: Run scraper
        run: npm start
        working-directory: scraper
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DEPARTURE_DATE: ${{ inputs.departure_date || '' }}
          RETURN_DATE: ${{ inputs.return_date || '' }}

      - name: Commit updated prices
        run: |
          git config user.name "flight-alert-bot"
          git config user.email "bot@flight-alert.dev"
          git add data/prices.json
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "snapshot $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git push
          fi
